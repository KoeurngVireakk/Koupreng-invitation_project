spring.application.name=backend
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/koupreng_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Phnom_Penh&allowPublicKeyRetrieval=true}

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:school}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

spring.jackson.time-zone=Asia/Phnom_Penh

app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:koupreng-backend}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
app.password-reset-token-minutes=${PASSWORD_RESET_TOKEN_MINUTES:30}
app.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
app.password-reset.email-from=${PASSWORD_RESET_EMAIL_FROM:no-reply@koupreng.local}
app.password-reset.log-token-in-development=${PASSWORD_RESET_LOG_TOKEN_IN_DEVELOPMENT:false}
app.auth.first-user-admin-enabled=${FIRST_USER_ADMIN_ENABLED:false}
